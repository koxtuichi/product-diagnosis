<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>赤ちゃん保湿クリーム診断</title>
    <meta
      name="description"
      content="赤ちゃん用の保湿クリーム・ローション選びで、いま先に確認したい軸を4問で整理する簡易診断です。"
    />
    <meta property="og:title" content="赤ちゃん保湿クリーム診断" />
    <meta
      property="og:description"
      content="アロベビーを中心に、毎日の使いやすさ・公式情報・容量感など、買う前の確認軸を整理します。"
    />
    <meta property="og:image" content="./assets/alobaby-note-thumbnail.png" />
    <link rel="stylesheet" href="./styles.css?v=20260618-baby-lotion-v2" />
  </head>
  <body>
    <main class="app" id="app">
      <section class="intro" aria-labelledby="app-title">
        <div class="intro__copy">
          <p class="label" data-disclosure-label>広告・PRを含みます</p>
          <h1 id="app-title" data-app-title>赤ちゃん保湿クリーム診断</h1>
          <p data-intro-copy></p>
          <div class="intro__actions">
            <button class="primary-button" type="button" data-start>
              診断を開始する
            </button>
            <a class="text-link" href="#" data-article-link>
              関連記事を読む
            </a>
          </div>
        </div>
        <figure class="product-figure" data-hero-figure>
          <img
            src="./assets/alobaby-milk-lotion-rakuten-240.jpg"
            alt="アロベビー ミルクローションの商品画像"
            data-hero-image
          />
          <figcaption data-hero-caption></figcaption>
        </figure>
      </section>

      <section class="notice" aria-label="このチェックの前提">
        <p data-notice></p>
      </section>

      <section class="quiz" aria-live="polite" hidden>
        <div class="progress">
          <span data-step-label>1 / 5</span>
          <div class="progress__bar" aria-hidden="true">
            <span data-progress-bar></span>
          </div>
        </div>
        <div class="question-card">
          <p class="label" data-question-kicker></p>
          <h2 data-question-title></h2>
          <div class="choices" data-choices></div>
        </div>
        <div class="nav-actions">
          <button class="secondary-button" type="button" data-back>戻る</button>
          <button class="secondary-button" type="button" data-reset>最初から</button>
        </div>
      </section>

      <section class="result" hidden>
        <div class="result__header">
          <p class="label" data-result-label>チェック結果</p>
          <p class="result-type-code" data-result-type-code></p>
          <h2 data-result-title></h2>
          <p class="result-tagline" data-result-tagline></p>
          <p data-result-summary></p>
          <div class="result-insight" data-result-insight hidden>
            <p class="result-insight__title">このタイプに近い理由</p>
            <p data-result-match-reason></p>
            <p class="result-insight__next" data-result-next-action></p>
          </div>
        </div>
        <div class="result__grid">
          <section class="result-box">
            <h3 data-points-title>先に見るポイント</h3>
            <ul data-result-points></ul>
          </section>
          <section class="result-box">
            <h3 data-checklist-title>買う前のメモ</h3>
            <ul data-result-checklist></ul>
          </section>
        </div>
        <section class="offers" aria-labelledby="offers-title">
          <div class="offers__header">
            <p class="label" data-offers-label>確認先候補</p>
            <h3 id="offers-title" data-offers-title>あなたに一番近い確認先</h3>
            <p data-offer-intro></p>
          </div>
          <div class="offer-list" data-offer-list></div>
          <p class="offer-note" data-offer-note></p>
        </section>
        <div class="nav-actions">
          <button class="secondary-button" type="button" data-reset-result>
            もう一度診断する
          </button>
          <a class="text-link" href="#" data-result-article-link>
            判断の記録を読む
          </a>
        </div>
      </section>
    </main>

    <script src="./data/diagnoses.js?v=20260618-baby-lotion-v2"></script>
    <script src="./data/career-change-a8-001.generated.js?v=20260618-baby-lotion-v2"></script>
    <script src="./app.js?v=20260618-baby-lotion-v2"></script>
  </body>
</html>
